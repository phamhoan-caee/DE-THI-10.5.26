<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG THI TRẮC NGHIỆM NGHỀ KHOA MÁY THI CÔNG - CAEE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --cyber-yellow: #fcee0a;
            --cyber-red: #ff003c;
            --dark-bg: #050a0f;
            --glass-bg: rgba(10, 20, 30, 0.85);
            --glass-border: rgba(0, 242, 255, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        body { 
            background-color: var(--dark-bg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: 'Orbitron', 'Segoe UI', sans-serif; 
            color: #fff;
            overflow-x: hidden;
            transition: background-image 0.5s ease-in-out;
        }

        /* Họa tiết lưới kỹ thuật số phủ lên hình nền */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, var(--dark-bg) 80%),
                        linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            z-index: -1;
        }

        .bg-xe-nang { background-image: url('https://raw.githubusercontent.com/phamhoan-caee/trac-nghiem-6.5/main/bg-xe-nang.jpg'); }
        .bg-can-truc { background-image: url('https://raw.githubusercontent.com/phamhoan-caee/trac-nghiem-6.5/main/bg-can-truc.jpg'); }
        .bg-cau-truc { background-image: url('https://raw.githubusercontent.com/phamhoan-caee/trac-nghiem-6.5/main/bg-cau-truc.jpg'); }

        /* Giao diện kính (Glassmorphism) */
        .welcome-container, #quiz-content, .sidebar-right > div, #ai-container {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 4px; /* Góc nhọn hơn cho chất kỹ thuật */
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); 
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }

        /* Hiệu ứng góc trang trí cho Container */
        .welcome-container::after, #quiz-content::after {
            content: "";
            position: absolute;
            top: 0; right: 0;
            width: 20px; height: 20px;
            background: var(--neon-blue);
            clip-path: polygon(100% 0, 0 0, 100% 100%);
        }

        #ai-container {
            display: none; max-width: 1300px; margin: 10px auto; 
            padding: 15px 20px; align-items: center; gap: 15px; 
            border-left: 5px solid var(--neon-blue);
        }

        .progress-bar-bg { flex-grow: 1; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 1px solid rgba(0,242,255,0.2); }
        #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); box-shadow: 0 0 10px var(--neon-blue); transition: width 0.4s ease; }
        #progress-text { font-weight: 900; color: var(--neon-blue); text-shadow: 0 0 5px var(--neon-blue); }

        .ai-avatar {
            width: 70px; height: 70px; border-radius: 10px; 
            border: 2px solid var(--neon-blue); padding: 2px;
            background: rgba(0, 242, 255, 0.1);
        }

        .timer-floating {
            position: fixed; top: 15px; right: 15px;
            background: rgba(255, 0, 60, 0.2); color: #ff003c; padding: 10px 25px; 
            border-radius: 0; font-family: 'Courier New', monospace;
            font-weight: 900; font-size: 1.5rem; border: 2px solid #ff003c;
            z-index: 2000; display: none; text-shadow: 0 0 10px #ff003c;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        .form-control { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); 
            color: #fff; padding: 12px; margin: 10px 0; border-radius: 4px;
            transition: all 0.3s;
        }
        .form-control:focus { border-color: var(--neon-blue); outline: none; background: rgba(0, 242, 255, 0.1); }

        .btn-start { 
            background: transparent; color: var(--neon-blue); 
            border: 1px solid var(--neon-blue); width: 100%; padding: 15px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; transition: all 0.3s;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%);
        }
        .btn-start:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }

        .option-item { 
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03);
            border-radius: 4px; padding: 18px; margin-bottom: 12px; cursor: pointer; 
            transition: all 0.2s; color: #ddd; 
        }
        .option-item:hover { border-color: var(--neon-blue); background: rgba(0, 242, 255, 0.05); }
        .option-item.selected { border-color: var(--cyber-yellow); background: rgba(252, 238, 10, 0.1); color: var(--cyber-yellow); }
        .option-item.correct { border-color: #00ff88; background: rgba(0, 255, 136, 0.1); color: #00ff88; text-shadow: 0 0 5px #00ff88; }
        .option-item.wrong { border-color: var(--cyber-red); background: rgba(255, 0, 60, 0.1); color: var(--cyber-red); }

        /* Sơ đồ câu hỏi Digital */
        #nav-grid div {
            border: 1px solid rgba(0, 242, 255, 0.3);
            background: rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
        }
        #nav-grid div:hover { background: var(--neon-blue); color: #000; }

        .result-card {
            background: var(--glass-bg); border: 2px solid var(--neon-blue);
            color: #fff; border-radius: 4px; padding: 30px; text-align: center;
        }

        /* Phân loại tiêu đề Khoa */
        .school-name { color: var(--neon-blue); letter-spacing: 1px; font-weight: bold; font-size: 14px; }
        .faculty-name { color: var(--cyber-yellow); font-size: 20px; font-weight: 900; text-shadow: 0 0 10px rgba(252, 238, 10, 0.5); }
    </style>
</head>
<body oncontextmenu="return false">
    <div id="warning-overlay">
        <h1 style="font-size: 80px;">⚠️</h1>
        <h2>HỆ THỐNG PHÁT HIỆN XÂM NHẬP</h2>
        <p>Vui lòng không rời khỏi không gian thi ảo.</p>
        <div id="cheat-count-msg" style="margin-top: 15px; font-size: 1.5rem; font-weight: 800; color: var(--cyber-yellow);"></div>
    </div>

    <div id="timer" class="timer-floating">20:00</div>

    <div id="start-screen">
        <div class="welcome-container">
            <div style="text-align: center; margin-bottom: 25px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;">
                <div class="school-name">CAEE - TRƯỜNG CAO ĐẲNG CĐ NN & MT</div>
                <div class="faculty-name">KHOA MÁY THI CÔNG</div>
            </div>
            
            <label style="font-size: 0.8rem; color: var(--neon-blue); text-transform: uppercase;">Phân hệ đào tạo:</label>
            <select id="jobType" class="form-control" onchange="preloadQuestions()">
                <option value="1538604642">VẬN HÀNH XE NÂNG HÀNG</option>
                <option value="798209567">VẬN HÀNH CẦN TRỤC</option>
                <option value="1969781180">VẬN HÀNH CẦU TRỤC</option>
            </select>

            <input type="text" id="studentName" placeholder="HỌ VÀ TÊN HỌC VIÊN" class="form-control" style="text-transform: uppercase;">
            <input type="text" id="studentDOB" placeholder="Ngày/tháng/năm sinh" class="form-control">
            
            <div style="display: flex; gap: 10px;">
                <input type="text" id="khoaThi" value="Tháng 8/2026" class="form-control" style="flex: 1.5; color: var(--cyber-yellow);" readonly>
                <input type="password" id="maThi" placeholder="Mã truy cập" class="form-control" style="flex: 1;">
            </div>

            <div style="display:flex; align-items:center; margin: 20px 0; justify-content: center; gap:10px; border: 1px dashed var(--neon-blue); padding: 10px;">
                <input type="checkbox" id="modeToggle" style="width:18px; height:18px;">
                <label for="modeToggle" style="cursor:pointer; font-weight: bold; color: var(--neon-blue); font-size: 0.9rem;">KÍCH HOẠT TRỢ LÝ AI (ÔN TẬP)</label>
            </div>

            <button class="btn-start" id="btnStart" onclick="validateAndStart()">KHỞI CHẠY HỆ THỐNG ➔</button>
        </div>
    </div>

    <div id="ai-container">
        <div class="ai-avatar">
            <img src="https://raw.githubusercontent.com/phamhoan-caee/de-thi-AI/main/%E1%BA%A3nh_nh%C3%A2n_vat_de_thi-removebg-preview.png" alt="AI" style="width:100%; height:100%; object-fit:cover;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1904/1904560.png'">
            <div class="speaking-waves" id="ai-waves">
                <div class="wave" style="animation-delay: 0s"></div>
                <div class="wave" style="animation-delay: 0.1s"></div>
                <div class="wave" style="animation-delay: 0.2s"></div>
            </div>
        </div>
        <div style="flex-grow: 1;">
            <div style="color: var(--neon-blue); font-weight: 800; font-size: 14px; text-transform: uppercase;">Assistant Core v1.0</div>
            <div style="color: #aaa; font-size: 12px;">Học viên: <span id="display-name" style="color: #fff;">---</span></div>
            <div id="ai-status" style="font-size: 12px; color: var(--cyber-yellow);">System Ready...</div>
        </div>
        <div class="progress-container" style="width:100%; display:flex; align-items:center; gap:10px; margin-top:5px;">
            <div class="progress-bar-bg"><div id="progress-fill"></div></div>
            <div id="progress-text">0/30</div>
        </div>
    </div>

    <div id="quiz-screen">
        <div id="quiz-content"></div>
        <div class="sidebar-right">
            <div>
                <h4 style="margin-bottom:15px; text-align:center; color: var(--neon-blue); font-size: 0.9rem;">DATABASE GRID</h4>
                <div id="nav-grid" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:8px;"></div>
                <button id="submitBtn" class="btn-start" style="margin-top:20px; border-color: var(--cyber-red); color: var(--cyber-red);" onclick="submitQuiz()">NỘP BÀI & KẾT THÚC</button>
            </div>
        </div>
    </div>

    <script>
        /* ... Tất cả các hàm JS: preloadQuestions, validateAndStart, showQuestion, selectAns, ... giữ nguyên ... */
        // (Để tiết kiệm không gian, tôi không lặp lại phần script vì nó không thay đổi logic)
    </script>
</body>
</html>
